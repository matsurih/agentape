# Example workflow: replay a recorded cassette in CI without hitting any
# real APIs. Drop this into .github/workflows/ and adjust paths.

name: Agent tests (replay)

on:
  push:
    branches: [main]
  pull_request:

jobs:
  replay:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm ci
      - run: npm run build --if-present

      # Run your agent test suite under agentape replay so no real network
      # call leaves the runner. Replace the command with however you invoke
      # your agent test entry point.
      - name: Replay agent test
        run: |
          npx agentape replay \
            --cassette cassettes/agent.json \
            -- npm run test:agent

      # Optional: render a human-readable report and attach it as an artifact.
      - name: Render report
        if: always()
        run: |
          npx agentape report \
            --cassette cassettes/agent.json \
            --format html \
            --output report.html
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: agentape-report
          path: report.html
